name: CI - Testes Automáticos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pytest

      - name: Rodar os testes
        run: pytest test/ -v

  build:
    runs-on: ubuntu-latest
    # sem "needs" → roda paralelo ao tests desde o início
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Build da aplicação
        run: echo "Build executado"

  notify:
    runs-on: ubuntu-latest
    needs: [tests, build]       # aguarda AMBOS terminarem
    steps:
      - name: Enviar notificação
        run: echo "Notificação enviada"

  deploy:
    runs-on: ubuntu-latest
    needs: notify               # só roda após notify
    steps:
      - name: Deploy da aplicação
        run: echo "Deploy realizado"