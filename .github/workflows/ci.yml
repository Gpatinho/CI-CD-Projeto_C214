name: CI - Testes Automáticos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Instalar o projeto
        run: pip install -e .

      - name: Rodar os testes
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Build da aplicação
        run: echo "Build executado"

  deploy:
    runs-on: ubuntu-latest
    needs: [tests, build]   # espera os testes e a biuld passar para rodar o deploy
    steps:
      - name: Deploy da aplicação
        run: echo "Deploy realizado"

  notify:
    runs-on: ubuntu-latest
    needs: [tests, build, deploy]   # roda ao final da pipeline, qunado tudo passar
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Enviar notificação por e-mail
        run: python notificacao.py
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          TESTS_STATUS:   ${{ needs.tests.result }}
          BUILD_STATUS:   ${{ needs.build.result }}
