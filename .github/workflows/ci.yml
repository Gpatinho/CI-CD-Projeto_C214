name: CI - Testes Automáticos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Instalar o projeto
        run: pip install -e .

      - name: Rodar os testes e gerar relatório HTML
        run: pytest tests/ -v --html=report.html --self-contained-html

      - name: Salvar relatório de testes como artifact
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: report.html

  build:
    runs-on: ubuntu-latest
    # sem "needs" → roda paralelo ao tests desde o início
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar ferramenta de build
        run: pip install build

      - name: Gerar pacote distribuível
        run: python -m build

      - name: Salvar pacote como artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacote-distribuivel
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: [tests, build]   # espera os testes e a build passar para rodar o deploy
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Definir nome da imagem em minúsculas
        id: image_name
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.image_name.outputs.name }}:latest

  notify:
    runs-on: ubuntu-latest
    needs: [tests, build, deploy]   # roda ao final da pipeline, quando tudo passar
    if: always()   # roda a notificação independente
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Enviar notificação por e-mail
        run: python notificacao.py
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          TESTS_STATUS:   ${{ needs.tests.result }}
          BUILD_STATUS:   ${{ needs.build.result }}
